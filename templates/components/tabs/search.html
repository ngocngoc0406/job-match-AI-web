<!-- Search Tab -->
<div class="tab-pane fade" id="search" role="tabpanel">
    <div class="py-4 text-center bg-light rounded-3 mb-4">
        <h3 class="fw-bold">Find Your Next Opportunity</h3>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="input-group input-group-lg shadow-sm">
                    <span class="input-group-text bg-white border-0"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control border-0" placeholder="Job title, keywords, or company">
                    <button class="btn btn-primary px-4">Search</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-3">
            <h5 class="fw-bold mb-3">Filters</h5>
            <div class="mb-3">
                <label class="form-label fw-medium">Location</label>
                <select class="form-select">
                    <option>All Locations</option>
                    <option>Remote</option>
                    <option>Ho Chi Minh</option>
                    <option>Hanoi</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-medium">Job Type</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" checked>
                    <label class="form-check-label">Full-time</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Part-time</label>
                </div>
            </div>
        </div>
        <div class="col-md-9">
            <h5 class="fw-bold mb-3">Latest Openings</h5>
            <div id="searchResults">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>
</div>
